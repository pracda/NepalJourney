# Local development stack.
#
# This covers Postgres (with pgvector) + Redis + the API service for fast
# iteration on backend logic. It does NOT replicate Supabase Auth/Storage/
# Realtime — for full parity with production, run `supabase start` instead
# (requires the Supabase CLI) and point api/.env at the local Supabase URLs
# it prints out. Either way, the API talks to Postgres exclusively through
# the Supabase client (api/db/client.py), so both setups are interchangeable
# from the API's point of view.
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nepal-journey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nepal_journey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nepal-journey-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nepal-journey-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
